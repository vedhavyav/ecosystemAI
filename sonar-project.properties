sonar.projectKey=vedhavyav-ecosystemAI
sonar.organization=vedhavyav

# This is the name and version displayed in the SonarCloud UI.
sonar.projectName=ecosystem-ai
sonar.projectVersion=1.0

# Path is relative to the sonar-project.properties file. Replace "\" by "/" on Windows.
sonar.sources=src
sonar.tests=src

# Exclude tests and Next.js artifacts from source code analysis
sonar.exclusions=**/*.test.tsx, **/*.test.ts, .next/**, node_modules/**, out/**
sonar.test.inclusions=**/*.test.tsx, **/*.test.ts

# Encoding of the source code. Default is default system encoding
sonar.sourceEncoding=UTF-8
